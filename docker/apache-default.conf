FcgidIPCDir /tmp/fcgid_ipc

<VirtualHost *:80>
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        Options +ExecCGI
        AddHandler fcgid-script .fcgi
        AllowOverride None
        Require all granted
    </Directory>

    # Route every request to app.fcgi, setting SCRIPT_URL to the original URI
    # so the FCGI application can match its registered handlers.
    RewriteEngine On
    RewriteRule ^/app\.fcgi$ - [L]
    RewriteRule ^(.*)$ /app.fcgi [E=SCRIPT_URL:$1,L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
