name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          native-image-job-reports: 'true'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build

      - name: Integration tests
        # test-jex and test-mysql are dependency subsets of test-avaje (which combines
        # avaje-jex + avaje-inject + avaje-http + hikari + mysql-connector), so their
        # native-image builds are skipped here to save CI time. Run them locally with
        # ./gradlew :test-jex:integrationTest / :test-mysql:integrationTest when needed.
        run: ./gradlew integrationTest -x :test-jex:integrationTest -x :test-mysql:integrationTest
