# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/build_environment.html#sec:gradle_configuration_properties

# Configuration cache disabled: OpenRewrite plugin is incompatible (uses Task.project at
# execution time and serialises DefaultProject). The cache entry is discarded on every
# rewriteDryRun run, so keeping it enabled just adds overhead with no benefit.
org.gradle.configuration-cache=false
# Parallel execution disabled: OpenRewrite plugin resolves classpaths during task execution
# without holding Gradle 9's required exclusive project lock.
# See https://github.com/openrewrite/rewrite-gradle-plugin/issues/183
org.gradle.parallel=false
org.gradle.caching=true
SONATYPE_CONNECT_TIMEOUT_SECONDS=300
SONATYPE_CLOSE_TIMEOUT_SECONDS=3600
